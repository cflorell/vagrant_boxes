stages:
  - build
  - trigger

spec:
  inputs:
    BOX_TO_BUILD:
      type: string
      default: "all"
      description: "Select which vagrant box to build"
      options:
        - "all"
        - "archlinux"
        - "fedora"
        - "ubuntu"

.build_vagrant_box:
  stage: build
  interruptible: true
  timeout: 20 minutes
  tags:
    - ansible
  resource_group: vagrant-box-builder

build_archlinux:
  extends: .build_vagrant_box
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web" && ($CI_INPUT_BOX_TO_BUILD == "all" || $CI_INPUT_BOX_TO_BUILD == "archlinux")
  script:
    - source ./build_archlinux.sh
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then ./publish_box.sh; fi

build_fedora:
  extends: .build_vagrant_box
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web" && ($CI_INPUT_BOX_TO_BUILD == "all" || $CI_INPUT_BOX_TO_BUILD == "fedora")
  script:
    - source ./build_fedora.sh
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then ./publish_box.sh; fi

build_ubuntu:
  extends: .build_vagrant_box
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web" && ($CI_INPUT_BOX_TO_BUILD == "all" || $CI_INPUT_BOX_TO_BUILD == "ubuntu")
  script:
    - source ./build_ubuntu.sh
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then ./publish_box.sh; fi

trigger_ansible_nodes_archlinux:
  stage: trigger
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"
  needs:
    - build_archlinux
  trigger:
    project: cf_homelab/ansible_nodes
    branch: main
    strategy: depend
  variables:
    FETCH_VAGRANT_BOXES: "true"
    BOX: "archlinux"

trigger_ansible_nodes_fedora:
  stage: trigger
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"
  needs:
    - build_fedora
  trigger:
    project: cf_homelab/ansible_nodes
    branch: main
    strategy: depend
  variables:
    FETCH_VAGRANT_BOXES: "true"
    BOX: "fedora44"

trigger_ansible_nodes_ubuntu:
  stage: trigger
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"
  needs:
    - build_ubuntu
  trigger:
    project: cf_homelab/ansible_nodes
    branch: main
    strategy: depend
  variables:
    FETCH_VAGRANT_BOXES: "true"
    BOX: "ubuntu26.04"
