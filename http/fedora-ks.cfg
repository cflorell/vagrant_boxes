text
lang en_US.UTF-8
keyboard us
timezone Europe/Stockholm

network --bootproto=dhcp --device=link --activate
rootpw --plaintext vagrant
user --name=vagrant --password=vagrant --plaintext --groups=wheel

# Disk
zerombr
clearpart --all --initlabel --drives=vda
autopart --type=plain
bootloader --location=mbr --drive=vda

%packages
@^server-product-environment
openssh-server
sudo
-plymouth
%end

%post
# Ensure network comes up on boot
nmcli connection modify "$(nmcli -t -f NAME con show | head -1)" connection.autoconnect yes || true
systemctl enable NetworkManager
systemctl enable sshd

echo "vagrant ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/vagrant
chmod 440 /etc/sudoers.d/vagrant

mkdir -m 0700 -p /home/vagrant/.ssh
curl -fsSL https://raw.githubusercontent.com/hashicorp/vagrant/main/keys/vagrant.pub \
  -o /home/vagrant/.ssh/authorized_keys
chmod 600 /home/vagrant/.ssh/authorized_keys
chown -R vagrant:vagrant /home/vagrant/.ssh
%end

reboot